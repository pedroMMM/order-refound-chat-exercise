[tools]
python = "3.12"
node = "22"
uv = "latest"

[env]
LANGFUSE_HOST = "http://localhost:3000"
LANGFUSE_PUBLIC_KEY = "pk-lf-local-demo"
LANGFUSE_SECRET_KEY = "sk-lf-local-demo"

[tasks.langfuse-up]
description = "Start local Langfuse stack"
run = "docker compose up -d"

[tasks.langfuse-down]
description = "Stop local Langfuse stack"
run = "docker compose down"

[tasks.langfuse-wait]
description = "Block until Langfuse health endpoint responds"
run = """
echo "Waiting for Langfuse..."
until curl -sf http://localhost:3000/api/public/health > /dev/null; do
  sleep 2
done
echo "Langfuse ready at http://localhost:3000"
"""

[tasks.langfuse-logs]
description = "Tail Langfuse container logs"
run = "docker compose logs -f langfuse-web"

[tasks.langfuse-reset]
description = "Destroy volumes and restart fresh (wipes all trace data)"
run = "docker compose down -v && docker compose up -d"

[tasks.install]
description = "Install backend Python deps via uv"
run = "uv sync --project backend --no-install-project"

[tasks.dev]
description = "Start backend API server"
run = "uv run --project backend uvicorn main:app --reload --port 8000 --app-dir backend"

[tasks.eval-seed]
description = "Seed Langfuse dataset with test cases (run once)"
run = "uv run --project backend python evals/seed_dataset.py"

[tasks.eval-run]
description = "Run evals against the agent and score in Langfuse"
run = "uv run --project backend python evals/run_evals.py"

[tasks.install-frontend]
description = "Install frontend Node deps"
run = "npm --prefix frontend install"

[tasks.dev-frontend]
description = "Start frontend dev server on :5173"
run = "npm --prefix frontend run dev"

[tasks.dev-all]
description = "Start backend + frontend concurrently"
run = """
mise run dev &
mise run dev-frontend &
wait
"""
